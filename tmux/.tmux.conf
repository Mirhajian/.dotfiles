# =====================
# General settings
# =====================
set -g default-terminal "tmux-256color"
set -g mouse on
set -g allow-passthrough on
set-window-option -g mode-keys vi

# =====================
# Key bindings
# =====================
unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# =====================
# TPM plugins
# =====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # presist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save session every 15 min
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'laktak/extrakto'

# =====================
# Plugin settings
# =====================
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @tmux-fzf-launch-key 'C-f'
set -g @tmux_fzf_options "-p -w 62% -h 38% -m"

set -g @extrakto_copy_key 'tab'
set -g @extrakto_insert_key 'enter'
set -g @extrakto_default_filter 'path'

# =====================
# Catppuccin theme
# =====================
set -g automatic-rename off
set-hook -g session-created 'rename-window "#(shuf -n1 -e Falcon Phoenix Nebula Comet Aurora Zephyr Quartz Ember Onyx Cipher)-#(shuf -i 10-99 -n1)"'
set-hook -g after-new-window  'rename-window "#(shuf -n1 -e Falcon Phoenix Nebula Comet Aurora Zephyr Quartz Ember Onyx Cipher)-#(shuf -i 10-99 -n1)"'

set -g @catppuccin_status_background "none"
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "custom"

# INACTIVE windows: dim gray pill (static, no ternary)
set -g @catppuccin_window_left_separator "#[fg=#{@thm_overlay_2},bg=default]"
set -g @catppuccin_window_right_separator "#[fg=#{@thm_surface_0},bg=default]"
set -g @catppuccin_window_middle_separator "#[fg=#{@thm_overlay_2},bg=#{@thm_surface_0}]"
set -g @catppuccin_window_number "#[fg=#{@thm_crust},bg=#{@thm_overlay_2}] #I "
set -g @catppuccin_window_text " #{window_name}"

# ACTIVE (current) window: mauve pill (static, no ternary)
set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_mauve},bg=default]"
set -g @catppuccin_window_current_right_separator "#[fg=#{@thm_surface_1},bg=default]"
set -g @catppuccin_window_current_middle_separator "#[fg=#{@thm_mauve},bg=#{@thm_surface_1}]"
set -g @catppuccin_window_current_number "#[fg=#{@thm_crust},bg=#{@thm_mauve}] #I "
set -g @catppuccin_window_current_text " #{window_name}"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left " "

set -g @catppuccin_date_time_text " %H:%M "

set -g status-right ""
set -ag  status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag  status-right "#{E:@catppuccin_status_date_time}"

set -g window-status-activity-style "fg=default,bg=default"
set -g window-status-bell-style "fg=default,bg=default"

# =====================
# Initialize TPM (keep at the very bottom)
# =====================
run '~/.tmux/plugins/tpm/tpm'
